<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Filter</title>
    <link rel="stylesheet" href="./retro.css" />
    <style>
      fieldset {
        margin: 5px 0px;
      }

      fieldset > * {
        margin: 0px 5px;
      }

      fieldset > div {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        margin: 20px 0px;
      }

      fieldset > div > * {
        padding: 5px;
        margin: 0px 5px;
      }

      fieldset > div > div {
        padding: 5px 10px !important;
      }

      .bordered {
        border: 1px dashed gray;
      }

      .loader {
        width: 48px;
        height: 48px;
        border: 5px solid #fff;
        border-bottom-color: #ff3d00;
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
        padding: 0px !important;
        margin 0px !important;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #schools {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      #schools * {
        padding: 10px 20px;
        margin: 10px 0px;
      }
    </style>
  </head>
  <body>
    <h1>Filter</h1>
    <form id="filters" action="./api/get">
      <fieldset>
        <legend>Academic Criteria</legend>
        <div>
          <div class="bordered">
            <label for="sat-min">Min Median SAT</label>
            <input
              id="sat-min"
              name="sat-min"
              min="400"
              max="1600"
              value="1200"
              type="range"
              step="10"
              oninput="this.nextElementSibling.value = this.value"
              list="sat-ticks"
            />
            <output>1200</output>
          </div>
          <div class="bordered">
            <label for="sat-max">Max Median SAT</label>
            <input
              id="sat-max"
              name="sat-max"
              min="400"
              max="1600"
              value="1400"
              type="range"
              step="10"
              oninput="this.nextElementSibling.value = this.value"
              list="sat-ticks"
            />
            <output>1400</output>
          </div>
          <datalist id="sat-ticks">
            <option value="400" label="400"></option>
            <option value="700"></option>
            <option value="1000"></option>
            <option value="1300"></option>
            <option value="1600" label="1600"></option>
          </datalist>
        </div>
        <div>
          <div class="bordered">
            <label for="gpa-min">Min Median GPA</label>
            <input
              id="gpa-min"
              name="gpa-min"
              min="0"
              max="5"
              value="3.0"
              type="range"
              step="0.01"
              oninput="this.nextElementSibling.value = this.value"
              list="gpa-ticks"
            />
            <output>3.00</output>
          </div>
          <div class="bordered">
            <label for="gpa-max">Max Median GPA</label>
            <input
              id="gpa-max"
              name="gpa-max"
              min="0"
              max="5"
              value="4.20"
              type="range"
              step="0.01"
              oninput="this.nextElementSibling.value = this.value"
              list="gpa-ticks"
            />
            <output>4.20</output>
          </div>
          <datalist id="gpa-ticks">
            <option value="0" label="0"></option>
            <option value="1"></option>
            <option value="2"></option>
            <option value="3"></option>
            <option value="4"></option>
            <option value="5" label="5"></option>
          </datalist>
        </div>
      </fieldset>
      <fieldset>
        <legend>Location</legend>
        <div>
          <label for="west">West</label>
          <input id="west" name="west" type="checkbox" value="west" />
          <label for="ne">Northeast</label>
          <input id="ne" name="ne" type="checkbox" value="ne" />
          <label for="south">South</label>
          <input id="south" name="south" type="checkbox" value="south" />
          <label for="mw">Midwest</label>
          <input id="mw" name="mw" type="checkbox" value="mw" />
          <label for="pacific">Pacific</label>
          <input id="pacific" name="pacific" type="checkbox" value="pacific" />
        </div>
      </fieldset>
      <fieldset>
        <legend>Identity</legend>
        <div>
          Type:
          <label for="priv">Private</label>
          <input id="priv" name="priv" type="checkbox" value="priv" />
          <label for="pub">Public</label>
          <input id="pub" name="pub" type="checkbox" value="pub" />
        </div>
        <div>
          <div class="bordered">
            <label for="admit-min">Min Admit Rate</label>
            <input
              id="admit-min"
              name="admit-min"
              min="0"
              max="100"
              value="20"
              type="range"
              step="1"
              oninput="this.nextElementSibling.value = this.value"
              list="admit-ticks"
            />
            <output>20</output>%
          </div>
          <div class="bordered">
            <label for="admit-max">Max Admit Rate</label>
            <input
              id="admit-max"
              name="admit-max"
              min="0"
              max="100"
              value="50"
              type="range"
              step="1"
              oninput="this.nextElementSibling.value = this.value"
              list="admit-ticks"
            />
            <output>50</output>%
          </div>
          <datalist id="admit-ticks">
            <option value="0" label="0%"></option>
            <option value="25"></option>
            <option value="50"></option>
            <option value="75"></option>
            <option value="100" label="100%"></option>
          </datalist>
        </div>
      </fieldset>
      <input type="submit" />
    </form>

    <hr />

    <div id="schools"></div>

    <script>
      const form = document.getElementById("filters");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        document.getElementById("schools").innerHTML =
          `<span id="load" class="loader"></span>`;
        document.getElementById("load").style.display = "block";
        const queryString = new URLSearchParams(new FormData(this)).toString();
        console.log(`${this.action}?${queryString}`);

        try {
          let response = await fetch(`${this.action}?${queryString}`);
          let schools = await response.json();
          for (let school of schools) {
            document.getElementById("schools").innerHTML +=
              `<div class='bordered'>${school}</div>`;
          }
        } catch (error) {
          document.getElementById("schools").innerHTML +=
            `The following error occured, try again later.
            ${error}
            <a href="https://github.com/quantalabs/filter/issues">Report this bug!</a>
            `;
        }

        document.getElementById("load").style.display = "none";
      });
    </script>
  </body>
</html>
